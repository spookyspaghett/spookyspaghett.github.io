<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heimdal</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="gate">
    <div class="glyph">◇◇◇</div>
    <p class="cryptic">A song that carries the key, if you know the tune.</p>

    <form id="gate-form" autocomplete="off">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="off" spellcheck="false" required>
      <button type="submit">Unlock</button>
      <p class="error" id="error" hidden>Incorrect password.</p>
    </form>

    <section id="revealed" hidden></section>
  </main>

  <script src="assets/js/heimdal-crypto.js"></script>
  <script src="assets/js/heimdal-gate.js"></script>
  <script>
    // FILL IN THE OUTPUT OF generate-page.js HERE.
    // The payload contains a list of numbers: the next password, XORed byte-for-byte
    // against the club song text (as the key stream), repeating if the message is
    // longer than the song. The key text is NOWHERE in this site -- only in this
    // local command:
    //   node generate-page.js --xor --text "<next password>" --key-file clublied.txt
    // Paste the printed numbers into the `html` of the payload JSON (e.g. in a
    // <pre>), and encrypt that JSON with --password + --file. Verify with:
    //   node generate-page.js --xor-decode --numbers "1,2,3,..." --key-file clublied.txt

</body>
</html>
