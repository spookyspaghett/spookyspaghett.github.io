<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heimdal</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="gate">
    <div class="glyph">◇◇◇</div>
    <p class="cryptic">A song that carries the key, if you know the tune.</p>

    <form id="gate-form" autocomplete="off">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="off" spellcheck="false" required>
      <button type="submit">Unlock</button>
      <p class="error" id="error" hidden>Incorrect password.</p>
    </form>

    <section id="revealed" hidden></section>
  </main>

  <script src="assets/js/heimdal-crypto.js"></script>
  <script src="assets/js/heimdal-gate.js"></script>
  <script>
    // FILL IN THE OUTPUT OF generate-page.js HERE.
    // The payload contains a Caesar cipher. The shift value comes from the club
    // song and is NOWHERE in this site -- only in this local command:
    //   node generate-page.js --caesar --shift <NUMBER_FROM_CLUB_SONG> --text "<next password>"
    // Paste the printed ciphertext into the `html` of the payload JSON (e.g. in
    // a <pre>), and encrypt that JSON with --password + --file.
    const PASSWORD_HASH = "9c73ba134128737810dfb0a3528a2d2aae87eaba0b725a152758a3de40a4f5bc";
    const PBKDF2_SALT = "heimdal-arg-fixed-salt-value-2025";
    const PBKDF2_ITERATIONS = 100000;
    const CIPHERTEXT = "0H8uTwTTYLKb4rJ0QzRzivWnZzUsPz4OUJCS+OFg9mj5z4V1FIS7xWga3E9NchsFk2/M6oXiruBfzGgMUus9cVKKNuFS5V7KCrHCGJC2HHSZE/XgqOWm7vN//m7VPw9dqTrxYBM/aqGRIWzGSNZ/wEbi+3i3YWflcnhLVjjomvuensFb1gHaij19yaYvxGuQMHYYEZ+rrzNVygI+MGasadt05D1AFwC9GmEPoPNPBH7P6z8c8Gu9/FrHuEy1AVccJNPdjpRVcHncv92cr9Vh+ri5zKH82Lz5TGf7z+rEhknERkODhj4hIvH1kgs5tRFdKXfhJQ==";
    const IV = "NST9cYeLorByfn/E";

    HeimdalGate.init({
      passwordHash: PASSWORD_HASH,
      salt: PBKDF2_SALT,
      iterations: PBKDF2_ITERATIONS,
      ciphertext: CIPHERTEXT,
      iv: IV,
    });
  </script>
</body>
</html>
