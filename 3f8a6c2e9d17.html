<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heimdal</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="gate">
    <div class="glyph">◇◇◇</div>
    <p class="cryptic">Three layers cover what is true.</p>

    <form id="gate-form" autocomplete="off">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="off" spellcheck="false" required>
      <button type="submit">Unlock</button>
      <p class="error" id="error" hidden>Incorrect password.</p>
    </form>

    <section id="revealed" hidden></section>
  </main>

  <script src="assets/js/heimdal-crypto.js"></script>
  <script src="assets/js/heimdal-gate.js"></script>
  <script>
    // FILL IN THE OUTPUT OF generate-page.js HERE.
    // The payload contains an encoding-stack puzzle: plaintext -> hex -> ROT13 -> base64.
    // Players must peel this back in reverse order (base64 -> ROT13 -> hex) to
    // find the next password. Generate the puzzle text locally with:
    //   node generate-page.js --encode-stack --text "<real message/password>"
    // then encrypt the payload JSON with --password + --file.
    // Current values are a placeholder test chain (the repo is public, so the
    // test password and demo message are deliberately not in this comment).
    const PASSWORD_HASH = "9c73ba134128737810dfb0a3528a2d2aae87eaba0b725a152758a3de40a4f5bc";
    const PBKDF2_SALT = "heimdal-arg-fixed-salt-value-2025";
    const PBKDF2_ITERATIONS = 100000;

    const IV = "zuBxNankkbB8v+vo";

    HeimdalGate.init({
      passwordHash: PASSWORD_HASH,
      salt: PBKDF2_SALT,
      iterations: PBKDF2_ITERATIONS,
      ciphertext: CIPHERTEXT,
      iv: IV,
    });
  </script>
</body>
</html>
