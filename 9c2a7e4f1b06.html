<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heimdal</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="gate">
    <div class="glyph">◇◇◇◇◇</div>
    <p class="cryptic">This place transmits more than it shows.</p>

    <form id="gate-form" autocomplete="off">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="off" spellcheck="false" required>
      <button type="submit">Unlock</button>
      <p class="error" id="error" hidden>Incorrect password.</p>
    </form>

    <section id="revealed" hidden></section>
  </main>

  <script src="assets/js/heimdal-crypto.js"></script>
  <script src="assets/js/heimdal-gate.js"></script>
  <script>
    // This fetch call always runs, independent of the password gate -- that's
    // intentional. Fragment B of the password for the final page is in the
    // JSON response below and is only visible via the Network tab (the response
    // is deliberately NOT shown on the page). Fragment A is a comment in /robots.txt.
    // FILL IN the real fragment B here (in assets/data/seismograph.json).
    fetch('assets/data/seismograph.json').catch(() => {});
  </script>
  <script>
    // FILL IN THE OUTPUT OF generate-page.js HERE.
    // The payload only contains the hint text pointing to robots.txt + the
    // Network tab. Encrypt it with --password + --file.

      salt: PBKDF2_SALT,

      ciphertext: CIPHERTEXT,
      iv: IV,
    });

</body>
</html>
